<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure 2FA Vault | The Ironic Bro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.2.2/otpauth.umd.min.js"></script>

    <style>
        /* --- TIB Smart Light Mode UI --- */
        :root {
            --bg-body: #f8fafc; --bg-card: #ffffff; 
            --primary: #4f46e5; --primary-hover: #4338ca; 
            --text-main: #0f172a; --text-muted: #64748b; 
            --border: #e2e8f0; --success: #10b981; --danger: #ef4444;
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        body { 
            background: var(--bg-body) radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px; color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            /* Global Anti-Copy */
            -webkit-user-select: none; user-select: none; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        .container { 
            margin-top: 60px; width: 100%; max-width: 600px; 
            padding: 0 20px; flex: 1; margin-bottom: 80px;
        }

        h2.section-title { 
            font-size: 2rem; margin-bottom: 25px; 
            border-left: 5px solid var(--primary); padding-left: 15px; 
            font-weight: 700; display: flex; align-items: center; justify-content: space-between;
        }

        .btn-logout {
            font-size: 0.9rem; padding: 8px 15px; background: #fee2e2;
            color: var(--danger); border: none; border-radius: 8px; cursor: pointer;
            font-weight: 600; display: none;
        }

        /* --- Screen Logic --- */
        #authScreen, #pinScreen, #appScreen { display: none; width: 100%; }

        /* --- Card Styles --- */
        .card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 30px; box-shadow: var(--shadow-md);
            margin-bottom: 30px; text-align: center;
        }

        .floating-input { position: relative; margin-bottom: 20px; text-align: left; }
        .floating-input input {
            width: 100%; padding: 18px 15px 12px;
            border: 2px solid var(--border); border-radius: 10px;
            background: transparent; font-size: 1rem; color: var(--text-main);
            transition: 0.3s; font-family: monospace;
        }
        .floating-input label {
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 0.95rem; transition: 0.3s;
            pointer-events: none; background: var(--bg-card); padding: 0 5px;
        }
        .floating-input input:focus, .floating-input input:not(:placeholder-shown) { border-color: var(--primary); }
        .floating-input input:focus ~ label, .floating-input input:not(:placeholder-shown) ~ label {
            top: 0; font-size: 0.85rem; color: var(--primary); font-weight: 700;
        }

        .btn-primary {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            font-size: 1.1rem; font-weight: 600; cursor: pointer; 
            background: var(--primary); color: white; transition: 0.3s;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-primary:disabled { background: var(--text-muted); cursor: not-allowed; }

        .auth-toggle { margin-top: 15px; font-size: 0.9rem; color: var(--primary); cursor: pointer; font-weight: 600;}

        /* --- App Styles --- */
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .global-timer { background: var(--bg-card); padding: 15px 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; display: none; }
        .progress-bar { height: 6px; background: var(--success); width: 100%; transition: width 1s linear; border-radius: 10px;}
        .progress-bar.danger { background: var(--danger); }
        
        .acc-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: var(--shadow-sm);
        }
        .acc-header { display: flex; justify-content: space-between; border-bottom: 1px dashed var(--border); padding-bottom: 10px; margin-bottom: 15px;}
        .btn-del { color: var(--text-muted); background: none; border: none; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .btn-del:hover { color: var(--danger); }

        /* Only Codes are selectable */
        .current-code { 
            font-size: 2.2rem; font-weight: 700; color: var(--primary); 
            letter-spacing: 2px; font-family: monospace; cursor: pointer;
            -webkit-user-select: text; user-select: text;
        }
        
        /* Sticky Reset (Bottom Right) */
        .sticky-reset {
            position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px;
            background: var(--bg-card); color: var(--danger);
            border: 2px solid #fee2e2; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem; cursor: pointer; z-index: 1000; box-shadow: var(--shadow-lg);
        }

        .toast {
            position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%);
            background: var(--text-main); color: #fff; padding: 12px 25px;
            border-radius: 50px; font-size: 0.9rem; transition: bottom 0.4s; z-index: 1000;
        }
        .toast.show { bottom: 30px; }

        @media (max-width: 480px) { .input-row { grid-template-columns: 1fr; gap: 0; } }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="section-title">
            <span><i class="fa-solid fa-shield-halved"></i> 2FA Vault</span>
            <button id="logoutBtn" class="btn-logout" onclick="signOut()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
        </h2>

        <div id="authScreen">
            <div class="card">
                <h3 style="margin-bottom: 20px;" id="authTitle">Login to Vault</h3>
                <div class="floating-input"><input type="email" id="emailInput" placeholder=" "><label>Email Address</label></div>
                <div class="floating-input"><input type="password" id="passwordInput" placeholder=" "><label>Password</label></div>
                <button class="btn-primary" id="authBtn" onclick="handleAuth()">Login</button>
                <div class="auth-toggle" onclick="toggleAuthMode()" id="authToggle">No account? Sign Up.</div>
            </div>
        </div>

        <div id="pinScreen">
            <div class="card">
                <h3 style="margin-bottom: 10px;"><i class="fa-solid fa-lock"></i> Vault Locked</h3>
                <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px;">Enter Master PIN to decrypt your keys.</p>
                <div class="floating-input"><input type="password" id="masterPinInput" placeholder=" "><label>Master PIN</label></div>
                <button class="btn-primary" onclick="unlockVault()"><i class="fa-solid fa-key"></i> Unlock</button>
            </div>
        </div>

        <div id="appScreen">
            <div class="card">
                <div class="input-row">
                    <div class="floating-input"><input type="text" id="brandInput" placeholder=" "><label>Brand Name</label></div>
                    <div class="floating-input"><input type="text" id="userInput" placeholder=" "><label>Username</label></div>
                </div>
                <div class="floating-input"><input type="password" id="secretKeyInput" placeholder=" "><label>Secret Key (Base32)</label></div>
                <button class="btn-primary" id="addBtn" onclick="addAccount()"><i class="fa-solid fa-plus"></i> Add Account</button>
                <div style="font-size:0.8rem; margin-top:10px; color:var(--text-muted);" id="slotCounter">Slots: 50/50</div>
            </div>

            <div class="global-timer" id="globalTimer">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-weight:600; font-size:0.85rem; color:var(--text-muted);">
                    <span>Valid for:</span><span id="countdownText">30s</span>
                </div>
                <div style="background:var(--border); border-radius:10px; height:6px;"><div class="progress-bar" id="progressBar"></div></div>
            </div>

            <div id="accountsContainer"></div>
        </div>
    </div>

    <button class="sticky-reset" onclick="resetAll()" title="Reset All"><i class="fa-solid fa-trash-can"></i></button>

    <div class="toast" id="toastMsg"><span id="toastText">Msg</span></div>

    <script>
        // --- SUPABASE CONFIG ---
        const SUPABASE_URL = 'https://pykkprrhsxvfhcrhbiue.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_7QcQbiHWoIXRXTik5tyCmw_InPPcI-c'; // <--- PUT YOUR LONG eyJ... KEY HERE
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let masterPin = null, accounts = [], isSignUp = false, timer;

        document.addEventListener('DOMContentLoaded', checkSession);

        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) { showScreen('pinScreen'); document.getElementById('logoutBtn').style.display='block'; }
            else { showScreen('authScreen'); document.getElementById('logoutBtn').style.display='none'; }
        }

        async function handleAuth() {
            const email = document.getElementById('emailInput').value, password = document.getElementById('passwordInput').value;
            if(!email || !password) return showToast("Enter credentials!");
            const { data, error } = isSignUp ? await supabase.auth.signUp({email, password}) : await supabase.auth.signInWithPassword({email, password});
            if(error) showToast(error.message); else checkSession();
        }

        function toggleAuthMode() {
            isSignUp = !isSignUp;
            document.getElementById('authTitle').innerText = isSignUp ? "Create Account" : "Login to Vault";
            document.getElementById('authBtn').innerText = isSignUp ? "Sign Up" : "Login";
            document.getElementById('authToggle').innerText = isSignUp ? "Have account? Login." : "No account? Sign Up.";
        }

        async function unlockVault() {
            const pin = document.getElementById('masterPinInput').value;
            if(!pin) return showToast("PIN required!");
            masterPin = pin;
            const { data, error } = await supabase.from('user_2fa_secrets').select('*');
            if(error) return showToast("Fetch error!");

            accounts = []; let fail = false;
            data.forEach(row => {
                try {
                    const dec = CryptoJS.AES.decrypt(row.encrypted_secret, masterPin).toString(CryptoJS.enc.Utf8);
                    if(!dec) throw 'err';
                    accounts.push({id: row.id, brand: row.brand, username: row.username, secret: dec});
                } catch(e) { fail = true; }
            });

            if(fail && data.length > 0) { showToast("Wrong Master PIN!"); masterPin = null; }
            else { showScreen('appScreen'); renderAccounts(); }
        }

        async function addAccount() {
            if(accounts.length >= 50) return showToast("50 Slots Limit!");
            const brand = document.getElementById('brandInput').value || 'Service', user = document.getElementById('userInput').value;
            const secret = document.getElementById('secretKeyInput').value.replace(/\s+/g, '').toUpperCase();
            if(!secret) return showToast("Secret required!");

            const enc = CryptoJS.AES.encrypt(secret, masterPin).toString();
            const { data, error } = await supabase.from('user_2fa_secrets').insert([{brand, username: user, encrypted_secret: enc}]).select();
            
            if(!error) { 
                accounts.push({id: data[0].id, brand, username: user, secret});
                renderAccounts(); showToast("Saved to Cloud!"); 
                document.getElementById('brandInput').value = ''; document.getElementById('userInput').value = ''; document.getElementById('secretKeyInput').value = '';
            }
        }

        function renderAccounts() {
            const container = document.getElementById('accountsContainer');
            container.innerHTML = '';
            document.getElementById('slotCounter').innerText = `Slots: ${50 - accounts.length}/50`;
            document.getElementById('addBtn').disabled = accounts.length >= 50;
            
            if(accounts.length === 0) { document.getElementById('globalTimer').style.display='none'; return; }
            document.getElementById('globalTimer').style.display='block';

            accounts.forEach((acc, i) => {
                container.insertAdjacentHTML('beforeend', `
                    <div class="acc-card">
                        <div class="acc-header">
                            <div><div style="font-weight:700;">${acc.brand}</div><div style="font-size:0.8rem;color:var(--text-muted);">${acc.username || ''}</div></div>
                            <button class="btn-del" onclick="deleteAcc('${acc.id}', ${i})"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                        <div class="current-code" id="code-${i}" onclick="copyC('code-${i}')">------</div>
                    </div>`);
            });
            updateCodes();
            if(timer) clearInterval(timer);
            timer = setInterval(updateCodes, 1000);
        }

        function updateCodes() {
            let rem = 30 - (Math.floor(Date.now() / 1000) % 30);
            document.getElementById('countdownText').innerText = rem + "s";
            let bar = document.getElementById('progressBar');
            bar.style.width = (rem/30*100) + "%";
            rem <= 5 ? bar.classList.add('danger') : bar.classList.remove('danger');

            accounts.forEach((acc, i) => {
                let totp = new OTPAuth.TOTP({secret: OTPAuth.Secret.fromBase32(acc.secret)});
                let code = totp.generate();
                let el = document.getElementById(`code-${i}`);
                el.innerText = code.slice(0,3) + ' ' + code.slice(3);
                el.style.color = rem <= 5 ? 'var(--danger)' : 'var(--primary)';
            });
        }

        async function deleteAcc(id, index) {
            if(!confirm("Delete forever?")) return;
            const { error } = await supabase.from('user_2fa_secrets').delete().eq('id', id);
            if(!error) { accounts.splice(index, 1); renderAccounts(); }
        }

        async function signOut() { await supabase.auth.signOut(); location.reload(); }
        function showScreen(id) { ['authScreen', 'pinScreen', 'appScreen'].forEach(s => document.getElementById(s).style.display='none'); document.getElementById(id).style.display='block'; }
        function showToast(m) { document.getElementById('toastText').innerText = m; document.getElementById('toastMsg').classList.add('show'); setTimeout(()=>document.getElementById('toastMsg').classList.remove('show'), 3000); }
        function copyC(id) { navigator.clipboard.writeText(document.getElementById(id).innerText.replace(' ','')).then(()=>showToast("Copied!")); }
        function resetAll() { if(confirm("Clear everything?")) accounts.forEach((a,i) => deleteAcc(a.id, i)); }
    </script>
</body>
</html>
